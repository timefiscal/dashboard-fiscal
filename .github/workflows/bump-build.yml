name: Bump build number

# Roda toda vez que index.html é alterado num push para a branch main.
# Gera um novo número de build (data/hora atual) e grava esse MESMO
# número em duas frentes: dentro do index.html (const APP_BUILD) e
# no version.json — exatamente a comparação que o app usa pra avisar
# quem está com uma versão desatualizada aberta.
on:
  push:
    branches: [main]
    paths:
      - 'index.html'

# Evita rodar duas vezes em paralelo se você der vários pushes seguidos
concurrency:
  group: bump-build
  cancel-in-progress: false

# Necessário pra Action poder commitar de volta no repo
permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar novo número de build
        id: build
        run: echo "value=$(date -u +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

      - name: Atualizar APP_BUILD no index.html
        run: |
          sed -i "s/const APP_BUILD = '[0-9]*';/const APP_BUILD = '${{ steps.build.outputs.value }}';/" index.html

      - name: Atualizar version.json
        run: |
          echo "{\"build\":\"${{ steps.build.outputs.value }}\"}" > version.json

      - name: Commitar mudanças
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html version.json
          # Só commita se algo realmente mudou (evita loop infinito de commits vazios)
          git diff --cached --quiet || git commit -m "chore: bump build to ${{ steps.build.outputs.value }} [skip ci]"
          git push
